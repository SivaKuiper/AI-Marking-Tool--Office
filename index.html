<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEIPL - Smart Marking Tool V10.1</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{font-family:'Plus Jakarta Sans',sans-serif}.mono{font-family:'JetBrains Mono',monospace}
        @media print{.no-print{display:none!important}body{background:#fff;padding:0;margin:0;color:#000}th,td{border:1px solid #ccc!important;padding:3px;font-size:7px!important}.print-photo{width:55px!important;height:40px!important;object-fit:cover;border:.5px solid #ccc;border-radius:3px}}
        .scan-pulse{animation:sp 2s ease-in-out infinite}@keyframes sp{0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,.4)}50%{box-shadow:0 0 0 15px rgba(59,130,246,0)}}
        .fade-in{animation:fi .3s ease-out}@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
        input[type=number]:focus{box-shadow:0 0 0 2px #3b82f6;border-color:#3b82f6!important;background:#eff6ff!important}
        .thumb{width:48px;height:36px;object-fit:cover;border-radius:4px;border:1px solid rgba(255,255,255,.1);cursor:pointer;transition:.2s}.thumb:hover{transform:scale(1.8);z-index:10;position:relative}
        .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;display:flex;align-items:center;justify-content:center;cursor:zoom-out}
        .modal-bg img{max-width:92vw;max-height:88vh;border-radius:12px;border:2px solid rgba(255,255,255,.15)}
    </style>
</head>
<body class="bg-white text-slate-900">
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo,useRef}=React;
const DH={customer:'',container:'',factory:'',destination:'',colour:'',marker:'',supervisor:'',defThick:'2',allowance:'0',reportNo:'',invoiceNo:'',inspectDate:new Date().toISOString().split('T')[0]};
/* === AI SCANNER === */
function OCRScanner({onDataExtracted}){
    const[scanning,setScanning]=useState(false);const[preview,setPreview]=useState(null);const[error,setError]=useState('');const[progress,setProgress]=useState('');
    const[apiKey,setApiKey]=useState(()=>{try{return localStorage.getItem('keipl_api_key')||''}catch{return''}});const[showKey,setShowKey]=useState(false);
    const fileRef=useRef(null);const camRef=useRef(null);
    const saveKey=(k)=>{setApiKey(k);try{localStorage.setItem('keipl_api_key',k)}catch{}};
    const processImage=async(b64,mtype)=>{
        setScanning(true);setError('');setProgress('Sending to AI...');
        try{
            const h={"Content-Type":"application/json"};
            if(apiKey){h["x-api-key"]=apiKey;h["anthropic-version"]="2023-06-01";h["anthropic-dangerous-direct-browser-access"]="true"}
            const prompt=`You are an expert at reading handwritten granite measurement sheets. Every number must be exact.

CRITICAL — COLUMN PAIRING RULES:
Sheets use PAIRED columns where the SAME serial number appears in TWO adjacent columns:
- Column A: S.No + Inches measurement (smaller numbers, typically 30-90)
- Column B: S.No + CMS measurement (larger numbers, typically 100-300)

Common layouts:
LAYOUT 1 (4 columns): 
  Col1=[S.No, Inches] Col2=[S.No, CMS] Col3=[S.No, Inches] Col4=[S.No, CMS]
  Col1 and Col2 share the SAME serial numbers (they are paired).
  Col3 and Col4 share DIFFERENT serial numbers (they are a second pair).
  Example: Col1 has sno 51-75 inches, Col2 has sno 51-75 CMS, Col3 has sno 76-100 inches, Col4 has sno 76-100 CMS.

LAYOUT 2 (6 columns):
  Three pairs: [Inches,CMS], [Inches,CMS], [Inches,CMS]

LAYOUT 3 (2 columns): One pair: [Inches,CMS]

HOW TO PAIR:
1. First identify ALL column groups by reading the serial numbers
2. Match columns that share the SAME serial number range
3. The column with SMALLER values (both dims < 80) = INCHES
4. The column with LARGER values (any dim > 80) = CMS
5. PAIR them into one slab entry per serial number
6. If a sheet has NO CMS columns (only inches + SFT), set l_cm=0, w_cm=0

HANDWRITING VERIFICATION:
- "7" vs "2" vs "1": 7 has horizontal top bar, 2 has a curve, 1 is straight
- "3" vs "8": 3 has open curves, 8 is closed
- "5" vs "6": flat top=5, curved=6
- "4" vs "9": open top=4, closed=9
- CROSS-CHECK: CMS_L ≈ Inches_L × 2.54. If ratio is far off, re-read digits.
- If SFT column exists: verify SFT = (Inches_L × Inches_W) / 144

RULES:
1. DO NOT STOP EARLY. Read EVERY row. Can be 50-180+ slabs.
2. Read ALL columns. Do not skip any.
3. Grade (F/G): include if visible, else grade="".
4. Look for TOTAL/GRAND TOTAL at bottom.
5. NEVER create separate slab entries for inches and CMS of the same serial number — they MUST be combined.

Return ONLY valid JSON (no markdown, no backticks):
{"slabs":[{"sno":51,"grade":"","l_in":84,"w_in":32,"l_cm":225,"w_cm":87}],"sheet_totals":{"count":50,"grand_total_sqf":0},"notes":""}

FINAL CHECK: Each sno should appear exactly ONCE with both inches AND cms values filled.`;
            const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:h,
                body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:16000,messages:[{role:"user",content:[
                    {type:"image",source:{type:"base64",media_type:mtype,data:b64}},
                    {type:"text",text:prompt}
                ]}]})});
            const d=await r.json();if(d.error)throw new Error(d.error.message);setProgress('Processing response...');
            const txt=d.content.map(i=>i.text||"").join("\n").replace(/```json|```/g,"").trim();
            let parsed,sheetTotals=null,fmt='both',aiNotes='',repaired=false;
            try{const full=JSON.parse(txt);if(full.slabs){parsed=full.slabs;sheetTotals=full.sheet_totals||null;fmt=full.format||'both';aiNotes=full.notes||''}else if(Array.isArray(full)){parsed=full}else{parsed=null}}
            catch(e1){
                try{const m=txt.match(/\[[\s\S]*\]/s);if(m)parsed=JSON.parse(m[0])}
                catch(e2){
                    try{let arr=txt;const ai=arr.indexOf('[');if(ai>=0)arr=arr.substring(ai);
                        const lb=arr.lastIndexOf('}');if(lb>0){arr=arr.substring(0,lb+1)+']';parsed=JSON.parse(arr);repaired=true}
                    }catch(e3){
                        try{const objs=txt.match(/\{[^{}]*?"sno"\s*:\s*\d+[^{}]*?\}/g);
                            if(objs&&objs.length>0){parsed=objs.map(o=>{try{return JSON.parse(o)}catch{return null}}).filter(Boolean);repaired=true}
                        }catch(e4){parsed=null}
                    }
                }
            }
            if(!Array.isArray(parsed)||!parsed.length)throw new Error('Could not parse AI response. Try again or use clearer photo.');
            /* POST-PROCESS: Merge duplicate sno entries (fix split inches/CMS) */
            const merged={};
            parsed.forEach(s=>{
                const key=s.sno;
                if(!merged[key]){merged[key]={...s}}
                else{
                    /* Merge: take non-zero values from both entries */
                    const ex=merged[key];
                    if(!ex.l_in&&s.l_in){ex.l_in=s.l_in;ex.w_in=s.w_in}
                    if(!ex.l_cm&&s.l_cm){ex.l_cm=s.l_cm;ex.w_cm=s.w_cm}
                    /* If both have inches, the larger one is probably CMS misclassified */
                    if(ex.l_in&&s.l_in&&ex.l_cm===0&&s.l_cm===0){
                        if(s.l_in>ex.l_in){ex.l_cm=s.l_in;ex.w_cm=s.w_in}
                        else{ex.l_cm=ex.l_in;ex.w_cm=ex.w_in;ex.l_in=s.l_in;ex.w_in=s.w_in}
                    }
                    if(!ex.grade&&s.grade)ex.grade=s.grade;
                }
            });
            parsed=Object.values(merged).sort((a,b)=>a.sno-b.sno);
            let warn='';
            if(repaired)warn='⚠ Response truncated — recovered '+parsed.length+' slabs. Some may be missing.';
            if(sheetTotals){
                if(sheetTotals.count&&parsed.length!==sheetTotals.count)warn+=(warn?' | ':'')+'Sheet='+sheetTotals.count+' vs got '+parsed.length;
                if(sheetTotals.grand_total_sqf){const calcSqf=parsed.reduce((a,s)=>a+((s.l_in*s.w_in)/144),0);const diff=Math.abs(calcSqf-sheetTotals.grand_total_sqf);
                    if(diff>2)warn+=(warn?' | ':'')+'SQF diff: Sheet='+sheetTotals.grand_total_sqf+' vs '+calcSqf.toFixed(2);}
            }
            setProgress('Found '+parsed.length+' slabs!'+(repaired?' (recovered)':''));
            if(aiNotes)warn+=(warn?' | ':'')+'AI: '+aiNotes;
            const rd=parsed.map((it,i)=>({id:Date.now()+i,sno:it.sno||(i+1),grade:(it.grade||'').toUpperCase(),
                l_in:parseFloat(it.l_in)||0,w_in:parseFloat(it.w_in)||0,
                l_cm:parseFloat(it.l_cm)||0,w_cm:parseFloat(it.w_cm)||0,
                status:'pending',edited:false}));
            onDataExtracted(rd,sheetTotals,warn);setScanning(false);setProgress('');
        }catch(err){setError(err.message||'Failed');setScanning(false);setProgress('')}
    };
    const handleFile=(e)=>{const f=e.target.files?.[0];if(!f)return;const rd=new FileReader();rd.onloadend=()=>{setPreview(rd.result);processImage(rd.result.split(",")[1],f.type||'image/jpeg')};rd.readAsDataURL(f)};
    return(
        <div className="bg-slate-50 p-5 rounded-2xl border border-blue-500/20">
            <div className="flex items-center gap-3 mb-4"><div className="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-lg">📸</div>
            <div><h3 className="text-xs font-extrabold uppercase tracking-widest text-blue-300">AI Measurement Scanner</h3><p className="text-[10px] text-slate-600 mt-0.5">Reads BOTH Inches & CMS</p></div></div>
            <div className="mb-4 bg-slate-100 rounded-xl p-3 border border-slate-300">
                <div className="flex items-center justify-between mb-2"><label className="text-[9px] font-extrabold text-slate-600 uppercase">API Key</label><div className="flex gap-2"><button onClick={()=>setShowKey(!showKey)} className="text-[9px] text-blue-400 font-bold">{showKey?'Hide':'Show'}</button>{apiKey&&<span className="text-[9px] text-emerald-400 font-bold">✓</span>}</div></div>
                <input type={showKey?"text":"password"} placeholder="sk-ant-api03-..." className="w-full p-2 rounded-lg bg-slate-50 border border-slate-400 text-xs mono text-slate-700 outline-none" value={apiKey} onChange={e=>saveKey(e.target.value)}/>
                <p className="text-[8px] text-slate-600 mt-1">🔒 Browser-only storage</p>
            </div>
            {!scanning&&!preview&&(<div className="grid grid-cols-2 gap-3">
                <div><input ref={camRef} type="file" accept="image/*" capture="environment" className="hidden" onChange={handleFile}/><button onClick={()=>{if(!apiKey){setError('Enter API key first');return}camRef.current?.click()}} className="w-full bg-blue-600 hover:bg-blue-500 p-4 rounded-xl text-center scan-pulse"><div className="text-2xl mb-1">📷</div><div className="text-[11px] font-extrabold uppercase">Camera</div></button></div>
                <div><input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={handleFile}/><button onClick={()=>{if(!apiKey){setError('Enter API key first');return}fileRef.current?.click()}} className="w-full bg-slate-200 hover:bg-slate-300 p-4 rounded-xl text-center"><div className="text-2xl mb-1">📁</div><div className="text-[11px] font-extrabold uppercase">Upload</div></button></div>
            </div>)}
            {scanning&&<div className="text-center py-6 fade-in"><div className="inline-block w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-3"></div><p className="text-sm font-bold text-blue-300">{progress}</p></div>}
            {preview&&!scanning&&<div className="fade-in"><img src={preview} className="w-full h-28 object-cover rounded-xl border border-slate-300 mb-3"/><button onClick={()=>{setPreview(null);setError('')}} className="w-full bg-slate-200 hover:bg-slate-300 py-2 rounded-xl text-xs font-bold uppercase">Scan Another</button></div>}
            {error&&<div className="mt-3 bg-red-50 border border-red-500/30 rounded-xl p-3"><p className="text-xs font-bold text-red-400">⚠ {error}</p></div>}
        </div>);
}

/* === REVIEW TABLE === */
function ReviewTable({reviewData:rd,setReviewData:srd,onConfirm,allowance,sheetTotals,scanWarn}){
    const ded=parseFloat(allowance)||0;
    const cnt=useMemo(()=>({p:rd.filter(r=>r.status==='pending').length,a:rd.filter(r=>r.status==='approved').length,r:rd.filter(r=>r.status==='rejected').length}),[rd]);
    const up=(id,f,v)=>srd(p=>p.map(r=>r.id===id?{...r,[f]:v,edited:true}:r));
    const ss=(id,s)=>srd(p=>p.map(r=>r.id===id?{...r,status:s}:r));
    const insertAfter=(sno)=>{srd(prev=>{const idx=prev.findIndex(r=>r.sno===sno);const newRow={id:Date.now(),sno:sno+0.5,grade:'',l_in:0,w_in:0,l_cm:0,w_cm:0,status:'pending',edited:true};
        const next=[...prev];next.splice(idx+1,0,newRow);return next.map((r,i)=>({...r,sno:i+1}))})};
    const removeRow=(id)=>{srd(prev=>prev.filter(r=>r.id!==id).map((r,i)=>({...r,sno:i+1})))};
    /* Arrow key navigation */
    const cols=['l_in','w_in','l_cm','w_cm'];
    const[focusRow,setFocusRow]=useState(0);
    const[focusCol,setFocusCol]=useState(0);
    const tableRef=useRef(null);
    const focusCell=(r,c)=>{
        const inp=tableRef.current?.querySelector(`[data-row="${r}"][data-col="${c}"]`);
        if(inp){inp.focus();inp.select();setFocusRow(r);setFocusCol(c)}
    };
    const handleKey=(e)=>{
        if(e.key==='ArrowDown'){e.preventDefault();focusCell(Math.min(focusRow+1,rd.length-1),focusCol)}
        else if(e.key==='ArrowUp'){e.preventDefault();focusCell(Math.max(focusRow-1,0),focusCol)}
        else if(e.key==='ArrowRight'||e.key==='Tab'){e.preventDefault();focusCell(focusRow,Math.min(focusCol+1,cols.length-1))}
        else if(e.key==='ArrowLeft'){e.preventDefault();focusCell(focusRow,Math.max(focusCol-1,0))}
        else if(e.key==='Enter'){e.preventDefault();focusCell(Math.min(focusRow+1,rd.length-1),0)}
    };
    /* Calculated totals from scanned data */
    const scannedSqfIn=rd.reduce((a,r)=>a+((r.l_in*r.w_in)/144),0).toFixed(2);
    const scannedSqfCm=rd.reduce((a,r)=>a+((r.l_cm*r.w_cm)/929.03),0).toFixed(2);
    return(
        <div className="bg-slate-50 border border-amber-500/30 rounded-2xl overflow-hidden fade-in">
            <div className="p-4" style={{background:'linear-gradient(135deg,#d97706,#ea580c)'}}><div className="flex justify-between items-center flex-wrap gap-2">
                <h3 className="text-sm font-extrabold uppercase text-white">Review Scanned Data</h3>
                <div className="flex gap-1.5 text-[10px]"><span className="bg-black/20 px-2 py-1 rounded font-bold">{cnt.p}⏳</span><span className="bg-black/20 px-2 py-1 rounded font-bold">{cnt.a}✓</span><span className="bg-black/20 px-2 py-1 rounded font-bold">{cnt.r}✕</span></div>
            </div><div className="flex gap-2 mt-3">
                <button onClick={()=>srd(p=>p.map(r=>r.status==='pending'?{...r,status:'approved'}:r))} className="bg-green-600 px-4 py-1.5 rounded-lg text-[10px] font-extrabold uppercase text-white">✓ Approve All</button>
                <button onClick={()=>srd(p=>p.map(r=>({...r,status:'pending'})))} className="bg-slate-200 px-4 py-1.5 rounded-lg text-[10px] font-extrabold uppercase text-white">↺ Reset</button>
                <button onClick={()=>insertAfter(rd.length)} className="bg-blue-600 px-4 py-1.5 rounded-lg text-[10px] font-extrabold uppercase text-white">+ Add Row</button>
            </div></div>
            {/* Warning Banner */}
            {scanWarn&&<div className="p-3 bg-red-50 border-b border-red-500/30"><p className="text-xs font-bold text-red-400">{scanWarn}</p></div>}
            {/* Sheet vs Scanned Totals */}
            <div className="p-3 bg-slate-100 border-b border-slate-300">
                <div className="flex flex-wrap gap-5 items-center text-[10px]">
                    <div><span className="text-slate-600 font-bold uppercase">Slabs:</span> <span className="mono font-extrabold text-slate-700 text-base">{rd.length}</span>
                        {sheetTotals&&sheetTotals.count&&<span className={"font-bold ml-1 "+(rd.length===sheetTotals.count?'text-green-400':'text-red-400')}>(Sheet: {sheetTotals.count}{rd.length===sheetTotals.count?' ✓':' ≠'})</span>}
                    </div>
                    <div><span className="text-orange-500 font-bold uppercase">SQF(In):</span> <span className="mono font-extrabold text-orange-600 text-base">{scannedSqfIn}</span>
                        {sheetTotals&&sheetTotals.grand_total_sqf&&<span className={"font-bold ml-1 "+(Math.abs(parseFloat(scannedSqfIn)-sheetTotals.grand_total_sqf)<1?'text-green-600':'text-red-600')}>(Sheet: {sheetTotals.grand_total_sqf}{Math.abs(parseFloat(scannedSqfIn)-sheetTotals.grand_total_sqf)<1?' ✓':' ≠'})</span>}
                    </div>
                    <div><span className="text-blue-500 font-bold uppercase">SQF(CM):</span> <span className="mono font-extrabold text-blue-600 text-base">{scannedSqfCm}</span></div>
                    <div><span className="text-amber-500 font-bold uppercase">Diff:</span> <span className="mono font-extrabold text-amber-600">{(parseFloat(scannedSqfCm)-parseFloat(scannedSqfIn)).toFixed(2)}</span></div>
                </div>
            </div>
            <div className="overflow-x-auto" ref={tableRef}><table className="w-full text-center text-[11px]"><thead><tr className="bg-slate-100 text-[8px] uppercase text-slate-600">
                <th className="p-2">S.No</th><th className="p-2">Gr</th><th className="p-2 text-orange-500">In L</th><th className="p-2 text-orange-500">In Ht</th><th className="p-2 text-orange-500">SQF(In)</th><th className="p-2 text-blue-500">CM L</th><th className="p-2 text-blue-500">CM Ht</th><th className="p-2 text-blue-500">SQF(CM)</th><th className="p-2">St</th><th className="p-2">Act</th>
            </tr></thead><tbody>{rd.map((r,ri)=>(
                <tr key={r.id} className={"border-t border-slate-200 "+(ri===focusRow?'bg-blue-50 ':' ')+(r.status==='approved'?'bg-green-50':r.status==='rejected'?'bg-red-50 opacity-50':'')}>
                    <td className="p-2 mono font-bold text-slate-600">{r.sno}</td>
                    <td className="p-2"><select value={r.grade} onChange={e=>up(r.id,'grade',e.target.value)} className={"bg-transparent font-extrabold outline-none "+(r.grade==='F'?'text-blue-600':r.grade==='G'?'text-emerald-600':'text-slate-400')}><option value="">-</option><option value="F">F</option><option value="G">G</option></select></td>
                    <td className="p-1"><input type="number" data-row={ri} data-col="0" value={r.l_in} onFocus={()=>{setFocusRow(ri);setFocusCol(0)}} onKeyDown={handleKey} onChange={e=>up(r.id,'l_in',parseFloat(e.target.value)||0)} className={"w-14 text-center p-1 rounded mono font-bold outline-none text-xs "+(r.edited?'bg-amber-50 border border-amber-400 text-amber-700':'bg-white border border-slate-300 text-orange-700')}/></td>
                    <td className="p-1"><input type="number" data-row={ri} data-col="1" value={r.w_in} onFocus={()=>{setFocusRow(ri);setFocusCol(1)}} onKeyDown={handleKey} onChange={e=>up(r.id,'w_in',parseFloat(e.target.value)||0)} className={"w-14 text-center p-1 rounded mono font-bold outline-none text-xs "+(r.edited?'bg-amber-50 border border-amber-400 text-amber-700':'bg-white border border-slate-300 text-orange-700')}/></td>
                    <td className="p-2 mono font-bold text-orange-600">{((r.l_in*r.w_in)/144).toFixed(2)}</td>
                    <td className="p-1"><input type="number" data-row={ri} data-col="2" value={r.l_cm} onFocus={()=>{setFocusRow(ri);setFocusCol(2)}} onKeyDown={handleKey} onChange={e=>up(r.id,'l_cm',parseFloat(e.target.value)||0)} className={"w-14 text-center p-1 rounded mono font-bold outline-none text-xs "+(r.edited?'bg-amber-50 border border-amber-400 text-amber-700':'bg-white border border-slate-300 text-blue-700')}/></td>
                    <td className="p-1"><input type="number" data-row={ri} data-col="3" value={r.w_cm} onFocus={()=>{setFocusRow(ri);setFocusCol(3)}} onKeyDown={handleKey} onChange={e=>up(r.id,'w_cm',parseFloat(e.target.value)||0)} className={"w-14 text-center p-1 rounded mono font-bold outline-none text-xs "+(r.edited?'bg-amber-50 border border-amber-400 text-amber-700':'bg-white border border-slate-300 text-blue-700')}/></td>
                    <td className="p-2 mono font-bold text-blue-600">{((r.l_cm*r.w_cm)/929.03).toFixed(2)}</td>
                    <td className="p-2">{r.status==='pending'?'⏳':r.status==='approved'?<span className="text-green-500 font-bold">✓</span>:<span className="text-red-600 font-bold">✕</span>}</td>
                    <td className="p-1.5"><div className="flex gap-1 justify-center">
                        <button onClick={()=>ss(r.id,'approved')} className={"w-7 h-7 rounded text-xs font-bold "+(r.status==='approved'?'bg-green-500 text-white':'bg-slate-200 text-green-600')}>✓</button>
                        <button onClick={()=>ss(r.id,'rejected')} className={"w-7 h-7 rounded text-xs font-bold "+(r.status==='rejected'?'bg-red-500 text-white':'bg-slate-200 text-red-600')}>✕</button>
                        <button onClick={()=>insertAfter(r.sno)} title="Insert row after" className="w-7 h-7 rounded text-xs font-bold bg-slate-200 text-blue-600 hover:bg-blue-600 hover:text-white">+</button>
                        <button onClick={()=>removeRow(r.id)} title="Delete row" className="w-7 h-7 rounded text-xs font-bold bg-slate-200 text-red-400 hover:bg-red-600 hover:text-white">🗑</button>
                    </div></td>
                </tr>))}
                {/* TOTALS ROW */}
                <tr className="bg-slate-100 border-t-2 border-slate-400">

                    <button onClick={doBulk} className="mt-3 bg-slate-200 text-white px-8 py-2.5 rounded-xl text-[11px] font-extrabold uppercase">Import</button>
                </div>)}

                {tab==='manual'&&!revData&&(<div className="bg-slate-50 text-white p-5 rounded-2xl border border-slate-200 max-w-lg">
                    <h3 className="text-xs font-extrabold text-blue-400 uppercase mb-4">Manual — Slab {entries.length+1}</h3>
                    <div className="space-y-3">
                        <p className="text-[9px] font-extrabold text-orange-400 uppercase">Buying (Inches)</p>
                        <div className="grid grid-cols-2 gap-2">
                            <input type="number" placeholder="Length (in)" className="p-3 rounded-lg bg-slate-100 border border-orange-500/30 font-bold mono outline-none text-orange-200" value={cur.inL} onChange={e=>setCur({...cur,inL:e.target.value})}/>
                            <input type="number" placeholder="Height (in)" className="p-3 rounded-lg bg-slate-100 border border-orange-500/30 font-bold mono outline-none text-orange-200" value={cur.inW} onChange={e=>setCur({...cur,inW:e.target.value})}/>
                        </div>
                        <p className="text-[9px] font-extrabold text-blue-400 uppercase">Selling (CMS)</p>
                        <div className="grid grid-cols-3 gap-2">
                            <input type="number" placeholder="Length (cm)" className="p-3 rounded-lg bg-slate-100 border border-blue-500/30 font-bold mono outline-none text-blue-200" value={cur.gL} onChange={e=>setCur({...cur,gL:e.target.value})}/>
                            <input type="number" placeholder="Height (cm)" className="p-3 rounded-lg bg-slate-100 border border-blue-500/30 font-bold mono outline-none text-blue-200" value={cur.gW} onChange={e=>setCur({...cur,gW:e.target.value})}/>
                            <select value={cur.grade||''} onChange={e=>setCur({...cur,grade:e.target.value})} className="p-3 rounded-lg bg-slate-100 border border-slate-300 font-bold outline-none"><option value="">Gr</option><option value="F">F</option><option value="G">G</option></select>
                        </div>
                        <div className="flex items-center gap-2"><input type="file" accept="image/*" capture="environment" className="hidden" id="slab-ph" onChange={e=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onloadend=()=>setCur(p=>({...p,photo:r.result}));r.readAsDataURL(f)}}/>
                            <label htmlFor="slab-ph" className="cursor-pointer bg-slate-200 hover:bg-slate-300 p-3 rounded-lg flex-1 text-center text-[10px] font-bold uppercase">{cur.photo?"✅ Photo":"📷 Slab Photo"}</label>
                            {cur.photo&&<button onClick={()=>setCur(p=>({...p,photo:null}))} className="text-red-400 font-bold text-lg px-2">✕</button>}</div>
                        {cur.photo&&<img src={cur.photo} className="w-full h-24 object-cover rounded-lg border border-slate-300"/>}
                    </div>
                    <button onClick={addUp} className="bg-blue-600 mt-4 py-3.5 rounded-xl font-extrabold uppercase text-sm w-full shadow-lg">{editId?'Update':'Add Slab ➜'}</button>
                </div>)}
            </div>
            {live.length>0&&(<>
                <div className="mb-1"><span className="text-[9px] font-extrabold text-slate-600 uppercase">Size (Gross Length — Pre-Allowance)</span></div>
                <div className="grid grid-cols-5 gap-2 mb-5">{[{l:'All',k:null},{l:'300+',k:'o300'},{l:'250+',k:'o250'},{l:'200+',k:'o200'},{l:'<200',k:'b200'}].map(f=>(
                    <button key={f.l} onClick={()=>setFRange(f.l)} className={"p-3 rounded-xl text-center "+(fRange===f.l?'bg-blue-600 text-white shadow-lg':'bg-slate-50 border border-slate-200 text-slate-700')}>
                        <p className="text-[10px] font-extrabold uppercase opacity-60">{f.l}</p>
                        <p className="text-xl font-black leading-none mt-1">{f.k?stats.cat[f.k]:live.length}</p>
                    </button>))}</div>

                <div className="bg-slate-50 border border-slate-200 shadow-xl overflow-hidden rounded-2xl mb-6">
                    <div className="overflow-x-auto"><table className="w-full text-center text-[11px]"><thead>
                        <tr className="bg-slate-100 text-[8px] uppercase text-slate-600">
                            <th className="p-2 text-left">Slab</th>{showPh&&<th className="p-2">Pic</th>}<th className="p-2">Gr</th>
                            <th className="p-2 text-orange-300">In L×Ht</th><th className="p-2 text-orange-300">SQF(In)</th>
                            <th className="p-2 text-blue-300">CM L×Ht</th><th className="p-2 text-blue-300">SQF(CM)</th><th className="p-2 text-blue-300">Gross m²</th>
                            <th className="p-2 text-amber-400 no-print">Margin</th><th className="p-2 text-cyan-400">CAll</th>
                            <th className="p-2 text-purple-400 no-print">Kept</th>
                            <th className="p-2 text-green-400">Net</th><th className="p-2 text-emerald-300">N.m²</th><th className="p-2 no-print">Act</th>
                        </tr></thead><tbody>{filt.map(e=>(
                        <tr key={e.id} className="border-t border-slate-200/50 hover:bg-slate-100/30">
                            <td className="p-2 text-left font-extrabold text-blue-400 mono text-[10px]">{e.slabNo}</td>
                            {showPh&&<td className="p-1">{e.photo?<img src={e.photo} className="thumb print-photo" onClick={()=>setZoomPh(e.photo)}/>:<span className="text-slate-700 text-[8px]">—</span>}</td>}
                            <td className="p-2"><span className={"px-1.5 py-0.5 rounded text-[9px] font-extrabold "+(e.grade==='F'?'bg-blue-500/20 text-blue-300':e.grade==='G'?'bg-emerald-500/20 text-emerald-300':'text-slate-600')}>{e.grade||'-'}</span></td>
                            <td className="p-2 text-orange-300/70 mono text-[10px]">{e.inL}×{e.inW}</td><td className="p-2 text-orange-300/70">{e.sqfIn}</td>
                            <td className="p-2 text-blue-300 mono text-[10px]">{e.gL}×{e.gW}</td><td className="p-2 text-blue-300">{e.sqfCm}</td><td className="p-2 text-blue-300">{e.gSqm}</td>
                            <td className="p-2 font-bold text-amber-400 no-print">{e.totalMargin}</td><td className="p-2 font-bold text-cyan-400">{e.custAllow}</td>
                            <td className="p-2 font-extrabold text-purple-400 no-print">{e.retained}</td>
                            <td className="p-2 font-bold text-green-400 mono text-[10px]">{e.nL}×{e.nW}</td><td className="p-2 font-extrabold text-emerald-300">{e.nSqm}</td>
                            <td className="p-2 no-print"><div className="flex gap-1 justify-center">
                                <button onClick={()=>{setEditId(e.id);setCur({inL:e.inL||'',inW:e.inW||'',gL:e.gL,gW:e.gW,grade:e.grade,photo:e.photo});setTab('manual');window.scrollTo(0,0)}} className="text-blue-400 font-bold text-[10px]">✎</button>
                                <button onClick={()=>setEntries(p=>p.filter(x=>x.id!==e.id))} className="text-red-400/40 hover:text-red-400">✕</button>
                            </div></td>
                        </tr>))}</tbody></table></div></div>

                <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 no-print">
                    <div className="bg-orange-50 border border-orange-500/20 p-5 rounded-2xl"><p className="text-[10px] font-extrabold text-orange-400 uppercase">SQF (Inches)</p><p className="text-2xl font-black text-orange-300 mt-1">{stats.tI}</p>
                        <p className="text-[10px] font-bold text-blue-400 mt-2">SQF (CMS): <span className="text-blue-300">{stats.tIC}</span></p>
                        {parseFloat(stats.tI)>0&&<p className="text-[9px] text-slate-600 mt-1">Diff: {(parseFloat(stats.tIC)-parseFloat(stats.tI)).toFixed(3)}</p>}
                    </div>
                    <div className="bg-blue-50 border border-blue-500/20 p-5 rounded-2xl"><p className="text-[10px] font-extrabold text-blue-400 uppercase">CMS Gross m²</p><p className="text-2xl font-black text-blue-300 mt-1">{stats.gA}</p></div>
                    <div className="bg-amber-50 border border-amber-500/20 p-5 rounded-2xl"><p className="text-[10px] font-extrabold text-amber-400 uppercase">Total Margin</p><p className="text-2xl font-black text-amber-300 mt-1">{stats.tM} <span className="text-sm opacity-50">m²</span></p></div>
                    <div className="bg-purple-50 border border-purple-500/20 p-5 rounded-2xl"><p className="text-[10px] font-extrabold text-purple-400 uppercase">🔒 Retained</p><p className="text-2xl font-black text-purple-300 mt-1">{stats.tR} <span className="text-sm opacity-50">m²</span></p><p className="text-[10px] text-cyan-400 mt-1">Given: {stats.tC} m²</p></div>
                </div>

                <div className="grid grid-cols-2 gap-3 mb-6 no-print">{['F','G'].map(g=>{const s=stats.gs[g];return s&&s.n>0?(
                    <div key={g} className={"p-4 rounded-xl border "+(g==='F'?'bg-blue-50 border-blue-500/20':'bg-emerald-50 border-emerald-500/20')}>
                        <div className="flex justify-between"><span className={"text-lg font-black "+(g==='F'?'text-blue-400':'text-emerald-400')}>Grade {g}</span><span className="text-slate-600 text-xs font-bold">{s.n} slabs</span></div>
                        <div className="grid grid-cols-3 gap-2 mt-2 text-[10px]">
                            <div><span className="text-orange-400 font-bold block">Buy</span><span className="text-slate-700 font-bold">{s.sqf} SQF</span></div>
                            <div><span className="text-blue-400 font-bold block">Gross</span><span className="text-slate-700 font-bold">{s.gm} m²</span></div>
                            <div><span className="text-purple-400 font-bold block">Kept</span><span className="text-slate-700 font-bold">{s.ret} m²</span></div>
                        </div></div>):null})}</div>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-5 border-t-4 border-blue-500 pt-6 pb-16">
                    <div className="bg-gradient-to-br from-blue-600 to-blue-800 text-white p-7 rounded-2xl shadow-xl">
                        <p className="text-[10px] font-extrabold uppercase opacity-60">Net Payable</p><p className="text-4xl font-black mt-2">{stats.nA} <span className="text-base opacity-50">m²</span></p>
                        <div className="mt-4 pt-4 border-t border-blue-500/30 grid grid-cols-2 gap-2">
                            <div><p className="text-[9px] font-extrabold uppercase opacity-60">SQF (Inches)</p><p className="text-lg font-black text-orange-300">{stats.tI}</p></div>
                            <div><p className="text-[9px] font-extrabold uppercase opacity-60">SQF (CMS)</p><p className="text-lg font-black text-cyan-300">{stats.tIC}</p></div>
                        </div></div>
                    <div className="bg-slate-50 p-7 rounded-2xl border border-slate-200">
                        <div className="flex justify-between border-b border-slate-200 pb-3 mb-3"><span className="text-[11px] font-extrabold text-slate-600 uppercase">Gross</span><span className="font-bold text-slate-700">{stats.gA} m²</span></div>
                        <div className="flex justify-between items-center"><span className="text-[11px] font-extrabold text-cyan-400 uppercase">Cust Allow.</span><span className="text-4xl font-black text-cyan-400">{stats.pA}%</span></div>
                        <p className="text-[9px] text-center mt-2 font-bold text-slate-600">{stats.tC} m² ({header.allowance}cm/side)</p>
                        {/* LENGTH SUMMARY */}
                        <div className="mt-4 pt-4 border-t border-slate-200">
                            <p className="text-[9px] font-extrabold text-slate-600 uppercase mb-2">Length Summary (Gross)</p>
                            <div className="grid grid-cols-2 gap-1 text-[10px]">
                                <span className="text-slate-600">300+ cm:</span><span className="font-bold text-slate-700 text-right">{stats.cat.o300}</span>
                                <span className="text-slate-600">250-299:</span><span className="font-bold text-slate-700 text-right">{stats.cat.o250}</span>
                                <span className="text-slate-600">200-249:</span><span className="font-bold text-slate-700 text-right">{stats.cat.o200}</span>
                                <span className="text-slate-600">150-199:</span><span className="font-bold text-slate-700 text-right">{stats.cat.o150}</span>
                                <span className="text-slate-600">130-149:</span><span className="font-bold text-slate-700 text-right">{stats.cat.o130}</span>
                                <span className="text-slate-600">120-129:</span><span className="font-bold text-slate-700 text-right">{stats.cat.o120}</span>
                                <span className="text-slate-600">110-119:</span><span className="font-bold text-slate-700 text-right">{stats.cat.o110}</span>
                                <span className="text-slate-600">100-109:</span><span className="font-bold text-slate-700 text-right">{stats.cat.o100}</span>
                                <span className="text-slate-600">&lt;100:</span><span className="font-bold text-slate-700 text-right">{stats.cat.b100}</span>
                                <span className="text-blue-500 font-bold border-t border-slate-300 pt-1">Total:</span><span className="font-bold text-blue-500 text-right border-t border-slate-300 pt-1">{live.length}</span>
                            </div>
                        </div>
                    </div>
                    <div className="flex flex-col justify-end items-end pr-4"><div className="text-right">
                        <p className="text-[11px] font-extrabold text-slate-600 uppercase mb-8">Inspector Signature</p>
                        <div className="border-b-4 border-slate-400 w-56 mb-3"></div>
                        <p className="font-extrabold text-lg uppercase text-blue-400">{header.supervisor||'AUTHORIZED'}</p></div></div>
                </div>
            </>)}
        </div>);
}
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
